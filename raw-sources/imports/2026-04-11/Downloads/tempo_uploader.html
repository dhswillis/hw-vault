const CODE = "\"\"\"\nQuantConnect LEAN Algorithm \u2014 Tempo Trading Brain V3.1\n======================================================\nNQ Futures | IFVG + Liquidity Sweep + SMT Divergence\n\nV3.1 BUGFIXES (6 issues identified from V3 backtest: 39% WR, permanent CB halt):\n  1. CRITICAL: Circuit breaker deadlock \u2014 CB halted trading permanently because\n     recovery required 95% of peak equity but no trades could generate profit.\n     FIX: Time-based cooldown (5 trading days) + lowered recovery to 90%.\n  2. HIGH: IFVG detection was a generic reversal pattern, not a real Fair Value Gap.\n     FIX: Properly detect FVG (gap between C1 and C3 ranges), then check close-through.\n  3. HIGH: Double-entry bug \u2014 both 1m and 2m consolidators triggered entries.\n     FIX: Only 2m triggers entries; 1m is for ATR calculation + exit monitoring only.\n  4. HIGH: SMT compared NQ to prev_day levels but ES to recent-5-bar momentum.\n     FIX: Track ES prev_day_high/low and compare both instruments to their own PDH/PDL.\n  5. MEDIUM: Bias stuck at \"neutral\" during first 30 min (range too small).\n     FIX: Use previous day range for bias before 10:05 AM.\n  6. MEDIUM: Gap filter accepted 15-30 pt gaps with no quality gate.\n     FIX: Only accept 8-15 pt optimal gaps; 5-6 with extra confluence; reject 15-30.\n\nV3 PARAMETERS (from 281 transcriptions, 257,335 words):\n  - Risk per trade: 0.5% ($250 on $50k)\n  - IFVG gap: 8-15 pts optimal NQ\n  - TP1: 17 pts (trim 55%), TP2: 35 pts (trim 30%), TP3: 60 pts (runner 15%)\n  - Stop: 20-30 pts standard, 35-45 extended for A+ only\n  - Break-even: 17 pts profit, move stop to entry + 1 pt\n  - Session: 9:35-11:00 AM primary\n  - Max 2 consecutive losses per day\n  - SMT required (V3: primary confluence)\n  - Soft stops default (90%)\n\nINSTRUMENTS:\n  - NQ E-mini Nasdaq-100 (primary) \u2014 $20/point\n  - ES E-mini S&P 500 (SMT comparison only)\n\nBACKTEST: 2024-01-01 to 2025-12-31, $50,000 starting capital\n\nAUTHOR: Claude + Harrison Willis | February 2026\nSOURCE: tempo_rules_v3_complete.json (281 transcriptions, 257,335 words)\n\"\"\"\n\nfrom AlgorithmImports import *\nfrom datetime import datetime, time, timedelta\nimport numpy as np\n\n\nclass TempoTradeContext:\n    \"\"\"Context object for each active trade.\"\"\"\n    def __init__(self):\n        self.entry_price = 0.0\n        self.entry_time = None\n        self.entry_reason = \"\"\n        self.direction = 0          # 1 = long, -1 = short\n        self.initial_stop = 0.0\n        self.current_stop = 0.0\n        self.tp1 = 0.0\n        self.tp2 = 0.0\n        self.tp3 = 0.0\n        self.initial_qty = 0\n        self.remaining_qty = 0\n        self.atr_at_entry = 0.0\n        self.breakeven_hit = False\n        self.tp1_hit = False\n        self.tp2_hit = False\n        self.best_price = 0.0\n        self.ifvg_gap_level = 0.0\n        self.smt_confirmed = False\n\n\nclass TempoTradingBrainV3(QCAlgorithm):\n    \"\"\"\n    Tempo Trading Brain V3.1 \u2014 IFVG + Liquidity Sweep + SMT Primary.\n\n    Implements Tempo Trading methodology from 281 transcriptions (Oct 2024 - Jan 2026).\n    Every parameter comes directly from Tempo's own words \u2014 nothing is invented.\n\n    V3.1 fixes 6 bugs from V3 backtest (39% WR \u2192 target 55%+):\n      - Circuit breaker now has time-based recovery (was permanently stuck)\n      - IFVG detection now checks for actual Fair Value Gaps (was generic reversal)\n      - Single-timeframe entry (2m only, was double-counting on 1m+2m)\n      - Proper SMT using ES prev_day levels (was comparing apples to oranges)\n      - Bias uses prev_day range at market open (was stuck neutral)\n      - Gap filter tightened to 8-15 pts only (was accepting 5-30 pts)\n    \"\"\"\n\n    def Initialize(self):\n        # === BACKTEST PERIOD ===\n        self.SetStartDate(2024, 1, 1)\n        self.SetEndDate(2025, 12, 31)\n        self.SetCash(50000)\n        self.SetBrokerageModel(BrokerageName.QuantConnectBrokerage, AccountType.Margin)\n\n        # === INSTRUMENTS ===\n        nq = self.AddFuture(Futures.Indices.NASDAQ100EMini, Resolution.Second)\n        nq.SetFilter(timedelta(0), timedelta(90))\n        self.nq_symbol = nq.Symbol\n\n        es = self.AddFuture(Futures.Indices.SP500EMini, Resolution.Second)\n        es.SetFilter(timedelta(0), timedelta(90))\n        self.es_symbol = es.Symbol\n\n        self.nq_contract = None\n        self.es_contract = None\n\n        # === STRATEGY PARAMETERS ===\n        self.RISK_PCT = 0.005       # 0.5% risk per trade\n        self.NQ_POINT_VALUE = 20.0\n        self.MAX_CONTRACTS = 2\n\n        # IFVG gap sizes (NQ points) \u2014 V3.1: tightened filter\n        self.GAP_MIN_OPTIMAL = 8.0\n        self.GAP_MAX_OPTIMAL = 15.0\n        self.GAP_MIN_SMALL = 5.0    # Only with 3+ confluences\n        self.GAP_MAX_SMALL = 7.0\n        self.GAP_SKIP = 15.0        # V3.1: reject anything above 15 pts (was 30)\n\n        # Trim targets\n        self.TP1_PTS = 17.0\n        self.TP2_PTS = 35.0\n        self.TP3_PTS = 60.0\n\n        # V3 conservative trimming\n        self.TP1_TRIM_PCT = 0.55\n        self.TP2_TRIM_PCT = 0.30\n\n        # V3 methodology flags\n        self.USE_SOFT_STOPS = True\n        self.SMT_REQUIRED_FOR_FUNDED = True\n\n        # Break-even\n        self.BE_TRIGGER_PTS = 17.0\n        self.BE_BUFFER_PTS = 1.0\n\n        # Stop loss\n        self.STOP_MIN_PTS = 20.0\n        self.STOP_MAX_PTS = 30.0\n        self.STOP_EXTENDED_PTS = 45.0\n\n        # Session times\n        self.ENTRY_EARLIEST = time(9, 35)\n        self.PRIMARY_END = time(11, 0)\n        self.LUNCH_END = time(12, 30)\n        self.SECONDARY_END = time(15, 0)\n\n        # Risk management\n        self.MAX_LOSSES_PER_DAY = 2\n        self.CB_DRAWDOWN = 0.20\n        self.CB_RECOVERY = 0.90              # V3.1: lowered from 0.95 to 0.90\n        self.CB_COOLDOWN_DAYS = 5            # V3.1: time-based cooldown\n\n        self.ATR_PERIOD = 14\n\n        # === CONSOLIDATORS ===\n        # 2-minute bars: PRIMARY and ONLY entry timeframe (V3.1: removed 1m entries)\n        self.bars_2m = RollingWindow[TradeBar](30)\n        consolidator_2m = TradeBarConsolidator(timedelta(minutes=2))\n        consolidator_2m.DataConsolidated += self.OnBar2m\n        self.SubscriptionManager.AddConsolidator(self.nq_symbol, consolidator_2m)\n\n        # 1-minute bars: ATR calculation + exit monitoring ONLY (V3.1: no entries)\n        self.bars_1m = RollingWindow[TradeBar](30)\n        consolidator_1m = TradeBarConsolidator(timedelta(minutes=1))\n        consolidator_1m.DataConsolidated += self.OnBar1m\n        self.SubscriptionManager.AddConsolidator(self.nq_symbol, consolidator_1m)\n\n        # 5-minute bars: confirmation\n        self.bars_5m = RollingWindow[TradeBar](20)\n        consolidator_5m = TradeBarConsolidator(timedelta(minutes=5))\n        consolidator_5m.DataConsolidated += self.OnBar5m\n        self.SubscriptionManager.AddConsolidator(self.nq_symbol, consolidator_5m)\n\n        # 15-minute bars: structure\n        self.bars_15m = RollingWindow[TradeBar](20)\n        consolidator_15m = TradeBarConsolidator(timedelta(minutes=15))\n        consolidator_15m.DataConsolidated += self.OnBar15m\n        self.SubscriptionManager.AddConsolidator(self.nq_symbol, consolidator_15m)\n\n        # ES 1-minute bars for SMT\n        self.es_bars_1m = RollingWindow[TradeBar](30)\n        es_consolidator_1m = TradeBarConsolidator(timedelta(minutes=1))\n        es_consolidator_1m.DataConsolidated += self.OnESBar1m\n        self.SubscriptionManager.AddConsolidator(self.es_symbol, es_consolidator_1m)\n\n        # === STATE VARIABLES ===\n        # NQ session levels\n        self.prev_day_high = 0.0\n        self.prev_day_low = 0.0\n        self.prev_day_close = 0.0\n        self.today_high = 0.0\n        self.today_low = float('inf')\n        self.today_open = 0.0\n        self.london_high = 0.0\n        self.london_low = float('inf')\n        self.asia_high = 0.0\n        self.asia_low = float('inf')\n        self.am_high = 0.0\n        self.am_low = float('inf')\n\n        # NQ and ES session extremes for SMT\n        self.nq_session_high = 0.0\n        self.nq_session_low = float('inf')\n        self.es_session_high = 0.0\n        self.es_session_low = float('inf')\n\n        # V3.1 FIX #4: Track ES prev day levels properly\n        self.es_prev_day_high = 0.0\n        self.es_prev_day_low = 0.0\n        self.es_today_high = 0.0\n        self.es_today_low = float('inf')\n        self.es_current_date = None\n\n        # Daily state\n        self.current_date = None\n        self.daily_losses = 0\n        self.daily_trades = 0\n        self.trading_halted = False\n\n        # V3.1 FIX #1: Circuit breaker with time-based cooldown\n        self.equity_peak = 50000.0\n        self.circuit_breaker_on = False\n        self.cb_trigger_date = None          # Date when CB was triggered\n        self.cb_cooldown_count = 0           # Trading days since CB triggered\n\n        # ATR tracking\n        self.atr_values = RollingWindow[float](30)\n        self.prev_close_1m = 0.0\n\n        # FVG tracking (V3.1 FIX #2: maintain list of active FVGs)\n        self.active_fvgs = []     # List of {direction, top, bottom, bar_time, filled}\n        self.MAX_FVGS = 20        # Keep last 20 FVGs\n\n        # Active trade\n        self.trade = None\n        self.in_position = False\n\n        # Performance\n        self.total_trades = 0\n        self.total_wins = 0\n        self.total_losses = 0\n\n        # === SCHEDULING ===\n        self.Schedule.On(\n            self.DateRules.EveryDay(),\n            self.TimeRules.At(15, 55),\n            self.ForceFlattenEOD\n        )\n\n    # =========================================================================\n    # DATA HANDLERS\n    # =========================================================================\n\n    def OnData(self, data):\n        try:\n            for chain in data.FutureChains:\n                contracts = sorted([c for c in chain.Value], key=lambda x: x.Expiry)\n                if not contracts:\n                    continue\n                front = contracts[0]\n                sym_str = str(chain.Key)\n                if sym_str.startswith(str(self.nq_symbol)):\n                    self.nq_contract = front.Symbol\n                    price = float(front.LastPrice)\n                    if price > 0:\n                        self._TrackNQPrice(price)\n                elif sym_str.startswith(str(self.es_symbol)):\n                    self.es_contract = front.Symbol\n                    price = float(front.LastPrice)\n                    if price > 0:\n                        self._TrackESPrice(price)\n        except:\n            pass\n\n    def _TrackNQPrice(self, price):\n        t = self.Time.time()\n        d = self.Time.date()\n\n        if d != self.current_date:\n            if self.current_date is not None:\n                self.prev_day_high = self.today_high\n                self.prev_day_low = self.today_low if self.today_low < float('inf') else 0\n                self.prev_day_close = price\n\n            self.current_date = d\n            self.today_high = price\n            self.today_low = price\n            self.today_open = price\n            self.daily_losses = 0\n            self.daily_trades = 0\n            self.trading_halted = False\n            self.london_high = 0.0\n            self.london_low = float('inf')\n            self.asia_high = 0.0\n            self.asia_low = float('inf')\n            self.am_high = 0.0\n            self.am_low = float('inf')\n            self.nq_session_high = 0.0\n            self.nq_session_low = float('inf')\n\n            # V3.1 FIX #1: Increment circuit breaker cooldown counter on new day\n            if self.circuit_breaker_on:\n                self.cb_cooldown_count += 1\n\n        if price > self.today_high:\n            self.today_high = price\n        if price < self.today_low:\n            self.today_low = price\n\n        if price > self.nq_session_high:\n            self.nq_session_high = price\n        if price < self.nq_session_low:\n            self.nq_session_low = price\n\n        if time(2, 0) <= t < time(11, 0):\n            if price > self.london_high:\n                self.london_high = price\n            if price < self.london_low:\n                self.london_low = price\n\n        if t >= time(18, 0) or t < time(6, 0):\n            if price > self.asia_high:\n                self.asia_high = price\n            if price < self.asia_low:\n                self.asia_low = price\n\n        if time(9, 30) <= t < time(11, 0):\n            if price > self.am_high:\n                self.am_high = price\n            if price < self.am_low:\n                self.am_low = price\n\n    def _TrackESPrice(self, price):\n        \"\"\"V3.1 FIX #4: Track ES prev day high/low properly.\"\"\"\n        d = self.Time.date()\n\n        if d != self.es_current_date:\n            if self.es_current_date is not None:\n                self.es_prev_day_high = self.es_today_high\n                self.es_prev_day_low = self.es_today_low if self.es_today_low < float('inf') else 0\n            self.es_current_date = d\n            self.es_today_high = price\n            self.es_today_low = price\n            self.es_session_high = 0.0\n            self.es_session_low = float('inf')\n\n        if price > self.es_today_high:\n            self.es_today_high = price\n        if price < self.es_today_low:\n            self.es_today_low = price\n        if price > self.es_session_high:\n            self.es_session_high = price\n        if price < self.es_session_low:\n            self.es_session_low = price\n\n    # =========================================================================\n    # CONSOLIDATOR CALLBACKS\n    # =========================================================================\n\n    def OnBar2m(self, sender, bar):\n        \"\"\"2-minute bar: PRIMARY and ONLY entry timeframe.\"\"\"\n        self.bars_2m.Add(bar)\n\n        # Scan for new FVGs on every bar (V3.1 FIX #2)\n        self._ScanForFVGs(self.bars_2m)\n\n        if self.bars_2m.Count < 5:\n            return\n        self._ProcessEntryBar(bar, \"2m\")\n\n    def OnBar1m(self, sender, bar):\n        \"\"\"1-minute bar: ATR calculation + exit monitoring ONLY (V3.1: no entries).\"\"\"\n        self.bars_1m.Add(bar)\n\n        # ATR calculation\n        if self.prev_close_1m > 0:\n            tr = max(\n                float(bar.High - bar.Low),\n                abs(float(bar.High) - self.prev_close_1m),\n                abs(float(bar.Low) - self.prev_close_1m)\n            )\n            if self.atr_values.Count == 0:\n                self.atr_values.Add(tr)\n            else:\n                atr = (self.atr_values[0] * (self.ATR_PERIOD - 1) + tr) / self.ATR_PERIOD\n                self.atr_values.Add(atr)\n        self.prev_close_1m = float(bar.Close)\n\n        # V3.1 FIX #3: 1m ONLY monitors exits, does NOT trigger entries\n        if self.in_position and self.trade is not None:\n            self._CheckExits(bar)\n\n    def OnBar5m(self, sender, bar):\n        self.bars_5m.Add(bar)\n\n    def OnBar15m(self, sender, bar):\n        self.bars_15m.Add(bar)\n\n    def OnESBar1m(self, sender, bar):\n        self.es_bars_1m.Add(bar)\n\n    # =========================================================================\n    # FVG TRACKING (V3.1 FIX #2: Proper Fair Value Gap Detection)\n    # =========================================================================\n\n    def _ScanForFVGs(self, bars):\n        \"\"\"\n        Scan recent bars for new Fair Value Gaps.\n\n        ICT FVG definition:\n          Bearish FVG: C1.Low > C3.High (gap between C1 low and C3 high)\n          Bullish FVG: C3.Low > C1.High (gap between C1 high and C3 low)\n\n        We track these FVGs and check if later bars CLOSE THROUGH them (= IFVG).\n        \"\"\"\n        if bars.Count < 3:\n            return\n\n        c3 = bars[0]  # Most recent\n        c2 = bars[1]  # Middle\n        c1 = bars[2]  # Oldest\n\n        c1_high = float(c1.High)\n        c1_low = float(c1.Low)\n        c3_high = float(c3.High)\n        c3_low = float(c3.Low)\n\n        # Bearish FVG: gap between C1 low and C3 high (C1.Low > C3.High)\n        if c1_low > c3_high:\n            gap_size = c1_low - c3_high\n            if self.GAP_MIN_SMALL <= gap_size <= self.GAP_SKIP:\n                self.active_fvgs.append({\n                    \"direction\": -1,  # Bearish gap\n                    \"top\": c1_low,\n                    \"bottom\": c3_high,\n                    \"gap_size\": gap_size,\n                    \"bar_time\": c2.Time,\n                    \"filled\": False,\n                })\n\n        # Bullish FVG: gap between C1 high and C3 low (C3.Low > C1.High)\n        if c3_low > c1_high:\n            gap_size = c3_low - c1_high\n            if self.GAP_MIN_SMALL <= gap_size <= self.GAP_SKIP:\n                self.active_fvgs.append({\n                    \"direction\": 1,  # Bullish gap\n                    \"top\": c3_low,\n                    \"bottom\": c1_high,\n                    \"gap_size\": gap_size,\n                    \"bar_time\": c2.Time,\n                    \"filled\": False,\n                })\n\n        # Prune old FVGs (keep last MAX_FVGS)\n        if len(self.active_fvgs) > self.MAX_FVGS:\n            self.active_fvgs = self.active_fvgs[-self.MAX_FVGS:]\n\n    def _DetectIFVG(self, bar):\n        \"\"\"\n        V3.1 FIX #2: Detect Inverted FVG \u2014 current bar closes THROUGH an existing FVG.\n\n        Bullish IFVG: Price closes ABOVE a bearish FVG's top level\n          (bearish gap gets \"inverted\" = filled from below = bullish signal)\n        Bearish IFVG: Price closes BELOW a bullish FVG's bottom level\n          (bullish gap gets \"inverted\" = filled from above = bearish signal)\n\n        Returns the most recent unfilled FVG that was just inverted, or None.\n        \"\"\"\n        bar_close = float(bar.Close)\n        bar_high = float(bar.High)\n        bar_low = float(bar.Low)\n        bar_open = float(bar.Open)\n\n        best_ifvg = None\n\n        for fvg in reversed(self.active_fvgs):  # Check most recent first\n            if fvg[\"filled\"]:\n                continue\n\n            if fvg[\"direction\"] == -1:\n                # Bearish FVG: top = C1.Low, bottom = C3.High\n                # INVERTED (bullish signal) when price closes ABOVE top\n                if bar_close > fvg[\"top\"] and bar_open < fvg[\"top\"]:\n                    # Bar must have opened below and closed above (actual close-through)\n                    fvg[\"filled\"] = True\n                    best_ifvg = {\n                        \"direction\": 1,   # Bullish entry (inverting a bearish gap)\n                        \"gap_size\": fvg[\"gap_size\"],\n                        \"gap_level\": fvg[\"bottom\"],\n                    }\n                    break\n\n            elif fvg[\"direction\"] == 1:\n                # Bullish FVG: top = C3.Low, bottom = C1.High\n                # INVERTED (bearish signal) when price closes BELOW bottom\n                if bar_close < fvg[\"bottom\"] and bar_open > fvg[\"bottom\"]:\n                    fvg[\"filled\"] = True\n                    best_ifvg = {\n                        \"direction\": -1,  # Bearish entry (inverting a bullish gap)\n                        \"gap_size\": fvg[\"gap_size\"],\n                        \"gap_level\": fvg[\"top\"],\n                    }\n                    break\n\n        # Also mark FVGs as filled if price traded through them (even without entry)\n        for fvg in self.active_fvgs:\n            if fvg[\"filled\"]:\n                continue\n            if fvg[\"direction\"] == -1 and bar_high > fvg[\"top\"]:\n                fvg[\"filled\"] = True\n            elif fvg[\"direction\"] == 1 and bar_low < fvg[\"bottom\"]:\n                fvg[\"filled\"] = True\n\n        return best_ifvg\n\n    # =========================================================================\n    # MAIN SIGNAL PROCESSING\n    # =========================================================================\n\n    def _ProcessEntryBar(self, bar, timeframe):\n        try:\n            # --- V3.1 FIX #1: Circuit breaker with time-based recovery ---\n            equity = self.Portfolio.TotalPortfolioValue\n            if equity > self.equity_peak:\n                self.equity_peak = equity\n\n            drawdown = (self.equity_peak - equity) / self.equity_peak if self.equity_peak > 0 else 0\n\n            if self.circuit_breaker_on:\n                # Recovery conditions (ANY of these resets the CB):\n                # 1. Equity recovered to 90% of peak\n                # 2. Cooldown period elapsed (5 trading days)\n                if equity >= self.equity_peak * self.CB_RECOVERY:\n                    self.circuit_breaker_on = False\n                    self.cb_cooldown_count = 0\n                elif self.cb_cooldown_count >= self.CB_COOLDOWN_DAYS:\n                    # After cooldown, reset peak to current equity and resume\n                    self.equity_peak = equity\n                    self.circuit_breaker_on = False\n                    self.cb_cooldown_count = 0\n                    self.Log(f\"CB RESET: Cooldown complete. New peak: ${equity:,.0f}\")\n                else:\n                    return  # Still in cooldown\n            else:\n                # Check if we should trigger CB\n                if drawdown >= self.CB_DRAWDOWN:\n                    self.circuit_breaker_on = True\n                    self.cb_trigger_date = self.Time.date()\n                    self.cb_cooldown_count = 0\n                    self.Log(f\"CB TRIGGERED: Drawdown {drawdown:.1%}, peak ${self.equity_peak:,.0f}\")\n                    return\n\n            # --- Daily loss limit ---\n            if self.trading_halted or self.daily_losses >= self.MAX_LOSSES_PER_DAY:\n                self.trading_halted = True\n                # Still check exits even when halted\n                if self.in_position and self.trade is not None:\n                    self._CheckExits(bar)\n                return\n\n            # --- Session filter ---\n            t = bar.Time.time()\n            in_primary = self.ENTRY_EARLIEST <= t < self.PRIMARY_END\n            in_secondary = self.LUNCH_END <= t < self.SECONDARY_END\n            in_session = in_primary or in_secondary\n\n            # --- EXIT logic (always active) ---\n            if self.in_position and self.trade is not None:\n                self._CheckExits(bar)\n\n            # --- ENTRY logic (only during valid sessions, not in position) ---\n            if not self.in_position and in_session:\n                self._CheckEntries(bar, timeframe)\n\n        except Exception as e:\n            pass\n\n    # =========================================================================\n    # ENTRY DETECTION\n    # =========================================================================\n\n    def _CheckEntries(self, bar, timeframe):\n        if self.nq_contract is None:\n            return\n\n        price = float(bar.Close)\n        atr = self.atr_values[0] if self.atr_values.Count > 0 else 0\n        if atr <= 0:\n            return\n\n        # --- V3.1 FIX #5: Bias via premium/discount with prev_day fallback ---\n        bias = self._GetBias(price)\n\n        # --- V3.1 FIX #2: Proper IFVG detection (checks against tracked FVGs) ---\n        ifvg = self._DetectIFVG(bar)\n\n        # --- SMT Divergence ---\n        smt = self._CheckSMT()\n\n        # --- Liquidity sweep ---\n        sweep = self._DetectLiquiditySweep(bar, self.bars_2m)\n\n        entry = None\n\n        # ==============================\n        # ENTRY TYPE 1: IFVG (primary)\n        # ==============================\n        if ifvg is not None:\n            direction = ifvg[\"direction\"]\n            gap_size = ifvg[\"gap_size\"]\n\n            # Bias alignment check\n            bias_aligned = True\n            if direction == 1 and bias == \"premium\":\n                bias_aligned = False\n            elif direction == -1 and bias == \"discount\":\n                bias_aligned = False\n\n            if bias_aligned:\n                quality = self._RateSetup(direction, gap_size, smt, sweep)\n\n                # V3.1 FIX #6: Tighter gap filter\n                gap_ok = self._IsValidGapSize(gap_size, quality)\n\n                # V3: SMT required for funded accounts\n                smt_ok = (smt is not None and smt[\"direction\"] == direction) or not self.SMT_REQUIRED_FOR_FUNDED\n\n                if quality >= 2 and smt_ok and gap_ok:\n                    max_stop = self.STOP_EXTENDED_PTS if quality >= 4 else self.STOP_MAX_PTS\n                    stop_pts = max(self.STOP_MIN_PTS, min(gap_size * 1.5, max_stop))\n                    entry = {\n                        \"direction\": direction,\n                        \"stop_pts\": stop_pts,\n                        \"reason\": f\"IFVG_{timeframe}_{quality}conf\",\n                        \"gap_level\": ifvg[\"gap_level\"],\n                        \"smt\": smt is not None,\n                    }\n\n        # ==============================\n        # ENTRY TYPE 2: LIQUIDITY SWEEP + REJECTION\n        # ==============================\n        if entry is None and sweep is not None:\n            direction = sweep[\"direction\"]\n\n            bias_aligned = True\n            if direction == 1 and bias == \"premium\":\n                bias_aligned = False\n            elif direction == -1 and bias == \"discount\":\n                bias_aligned = False\n\n            if bias_aligned:\n                quality = 2  # Sweep is already strong\n                if smt is not None and smt[\"direction\"] == direction:\n                    quality += 1\n                if (direction == 1 and bias == \"discount\") or (direction == -1 and bias == \"premium\"):\n                    quality += 1\n\n                # Sweeps also require SMT for funded accounts\n                smt_ok = (smt is not None and smt[\"direction\"] == direction) or not self.SMT_REQUIRED_FOR_FUNDED\n\n                if quality >= 3 and smt_ok:  # V3.1: require 3+ confluences for sweeps\n                    stop_pts = max(self.STOP_MIN_PTS, sweep.get(\"stop_pts\", 25.0))\n                    entry = {\n                        \"direction\": direction,\n                        \"stop_pts\": stop_pts,\n                        \"reason\": f\"SWEEP_{sweep['level']}_{timeframe}\",\n                        \"gap_level\": 0,\n                        \"smt\": smt is not None,\n                    }\n\n        if entry is not None:\n            self._ExecuteEntry(bar, entry, atr)\n\n    def _IsValidGapSize(self, gap_size, quality=0):\n        \"\"\"V3.1 FIX #6: Tightened gap size filter.\"\"\"\n        if gap_size > self.GAP_SKIP:\n            return False\n        if self.GAP_MIN_OPTIMAL <= gap_size <= self.GAP_MAX_OPTIMAL:\n            return True\n        if self.GAP_MIN_SMALL <= gap_size < self.GAP_MIN_OPTIMAL:\n            return quality >= 3  # Small gaps only with 3+ confluences\n        return False\n\n    def _DetectLiquiditySweep(self, bar, bars):\n        if bars.Count < 2:\n            return None\n\n        curr = bars[0]\n        prev = bars[1]\n        curr_close = float(curr.Close)\n        curr_high = float(curr.High)\n        curr_low = float(curr.Low)\n        curr_open = float(curr.Open)\n        bar_body = abs(curr_close - curr_open)\n\n        sweep = None\n\n        # --- Bearish sweep (above a level, rejected down) ---\n        levels_high = []\n        if self.london_high > 0:\n            levels_high.append((\"LONDON_H\", self.london_high))\n        if self.prev_day_high > 0:\n            levels_high.append((\"PDH\", self.prev_day_high))\n        if self.am_high > 0:\n            levels_high.append((\"AM_H\", self.am_high))\n\n        for label, level in levels_high:\n            if level <= 0:\n                continue\n            swept = curr_high > level or float(prev.High) > level\n            rejected = curr_close < level\n            upper_wick = curr_high - max(curr_close, curr_open)\n            is_rejection = upper_wick > bar_body * 1.2 if bar_body > 0 else False\n\n            if swept and rejected and (is_rejection or curr_close < curr_open):\n                stop_pts = curr_high - level + 5.0\n                sweep = {\n                    \"direction\": -1,\n                    \"level\": label,\n                    \"stop_pts\": min(max(stop_pts, self.STOP_MIN_PTS), self.STOP_MAX_PTS),\n                }\n                break\n\n        # --- Bullish sweep (below a level, rejected up) ---\n        if sweep is None:\n            levels_low = []\n            if self.london_low < float('inf') and self.london_low > 0:\n                levels_low.append((\"LONDON_L\", self.london_low))\n            if self.prev_day_low > 0:\n                levels_low.append((\"PDL\", self.prev_day_low))\n            if self.am_low < float('inf') and self.am_low > 0:\n                levels_low.append((\"AM_L\", self.am_low))\n\n            for label, level in levels_low:\n                if level <= 0:\n                    continue\n                swept = curr_low < level or float(prev.Low) < level\n                rejected = curr_close > level\n                lower_wick = min(curr_close, curr_open) - curr_low\n                is_rejection = lower_wick > bar_body * 1.2 if bar_body > 0 else False\n\n                if swept and rejected and (is_rejection or curr_close > curr_open):\n                    stop_pts = level - curr_low + 5.0\n                    sweep = {\n                        \"direction\": 1,\n                        \"level\": label,\n                        \"stop_pts\": min(max(stop_pts, self.STOP_MIN_PTS), self.STOP_MAX_PTS),\n                    }\n                    break\n\n        return sweep\n\n    def _CheckSMT(self):\n        \"\"\"\n        V3.1 FIX #4: Proper SMT using ES prev_day_high/low.\n\n        Both NQ and ES are compared to their own previous day levels.\n        Divergence = one instrument swept a level but the other didn't.\n        \"\"\"\n        if (self.nq_session_high <= 0 or self.es_session_high <= 0 or\n            self.prev_day_high <= 0 or self.prev_day_low <= 0 or\n            self.es_prev_day_high <= 0 or self.es_prev_day_low <= 0):\n            return None\n\n        # NQ swept its prev_day_high?\n        nq_swept_high = self.nq_session_high > self.prev_day_high\n        # ES swept its prev_day_high?\n        es_swept_high = self.es_session_high > self.es_prev_day_high\n\n        # NQ swept its prev_day_low?\n        nq_swept_low = self.nq_session_low < self.prev_day_low\n        # ES swept its prev_day_low?\n        es_swept_low = self.es_session_low < self.es_prev_day_low\n\n        # Bearish SMT: One swept highs, the other didn't\n        if nq_swept_high and not es_swept_high:\n            return {\"direction\": -1, \"type\": \"BEARISH_SMT\"}\n        if es_swept_high and not nq_swept_high:\n            return {\"direction\": -1, \"type\": \"BEARISH_SMT\"}\n\n        # Bullish SMT: One swept lows, the other didn't\n        if nq_swept_low and not es_swept_low:\n            return {\"direction\": 1, \"type\": \"BULLISH_SMT\"}\n        if es_swept_low and not nq_swept_low:\n            return {\"direction\": 1, \"type\": \"BULLISH_SMT\"}\n\n        return None\n\n    def _GetBias(self, current_price):\n        \"\"\"\n        V3.1 FIX #5: Use prev_day range for bias before 10:05 AM.\n\n        Early session (before 10:05): use previous day's range midpoint\n        After 10:05: use today's developing range midpoint\n        \"\"\"\n        t = self.Time.time()\n\n        if t < time(10, 5):\n            # Early session: use previous day range\n            if self.prev_day_high <= 0 or self.prev_day_low <= 0:\n                return \"neutral\"\n            prev_range = self.prev_day_high - self.prev_day_low\n            if prev_range < 10.0:\n                return \"neutral\"\n            midpoint = self.prev_day_low + (prev_range * 0.5)\n        else:\n            # After 10:05: use today's range\n            daily_range = self.today_high - self.today_low\n            if daily_range < 10.0:\n                return \"neutral\"\n            midpoint = self.today_low + (daily_range * 0.5)\n\n        if current_price > midpoint + 5.0:\n            return \"premium\"\n        elif current_price < midpoint - 5.0:\n            return \"discount\"\n        return \"neutral\"\n\n    def _RateSetup(self, direction, gap_size, smt, sweep):\n        quality = 1  # Base: IFVG detected\n\n        if self.GAP_MIN_OPTIMAL <= gap_size <= self.GAP_MAX_OPTIMAL:\n            quality += 1\n\n        if smt is not None and smt[\"direction\"] == direction:\n            quality += 1\n\n        if sweep is not None and sweep[\"direction\"] == direction:\n            quality += 1\n\n        return quality\n\n    # =========================================================================\n    # EXECUTION\n    # =========================================================================\n\n    def _ExecuteEntry(self, bar, entry_signal, atr):\n        if self.nq_contract is None or self.in_position:\n            return\n\n        direction = entry_signal[\"direction\"]\n        stop_pts = entry_signal[\"stop_pts\"]\n        price = float(bar.Close)\n\n        risk_amount = self.Portfolio.TotalPortfolioValue * self.RISK_PCT\n        risk_per_contract = stop_pts * self.NQ_POINT_VALUE\n        if risk_per_contract <= 0:\n            return\n\n        qty = int(risk_amount / risk_per_contract)\n        qty = max(1, min(qty, self.MAX_CONTRACTS))\n\n        if direction == 1:\n            stop_loss = price - stop_pts\n            tp1 = price + self.TP1_PTS\n            tp2 = price + self.TP2_PTS\n            tp3 = price + self.TP3_PTS\n        else:\n            stop_loss = price + stop_pts\n            tp1 = price - self.TP1_PTS\n            tp2 = price - self.TP2_PTS\n            tp3 = price - self.TP3_PTS\n\n        try:\n            order_qty = qty * direction\n            ticket = self.MarketOrder(self.nq_contract, order_qty)\n\n            self.trade = TempoTradeContext()\n            self.trade.entry_price = price\n            self.trade.entry_time = bar.Time\n            self.trade.entry_reason = entry_signal[\"reason\"]\n            self.trade.direction = direction\n            self.trade.initial_stop = stop_loss\n            self.trade.current_stop = stop_loss\n            self.trade.tp1 = tp1\n            self.trade.tp2 = tp2\n            self.trade.tp3 = tp3\n            self.trade.initial_qty = qty\n            self.trade.remaining_qty = qty\n            self.trade.atr_at_entry = atr\n            self.trade.best_price = price\n            self.trade.ifvg_gap_level = entry_signal.get(\"gap_level\", 0)\n            self.trade.smt_confirmed = entry_signal.get(\"smt\", False)\n\n            self.in_position = True\n            self.daily_trades += 1\n            self.total_trades += 1\n\n            dir_str = \"LONG\" if direction == 1 else \"SHORT\"\n            self.Log(f\"ENTRY: {dir_str} {qty}x @ {price:.2f} | \"\n                     f\"Stop: {stop_loss:.2f} | TP1: {tp1:.2f} TP2: {tp2:.2f} TP3: {tp3:.2f} | \"\n                     f\"Reason: {entry_signal['reason']}\")\n\n        except Exception as e:\n            self.Log(f\"Entry failed: {e}\")\n\n    # =========================================================================\n    # EXIT MANAGEMENT\n    # =========================================================================\n\n    def _CheckExits(self, bar):\n        if self.trade is None or not self.in_position:\n            return\n\n        t = self.trade\n        price = float(bar.Close)\n        high = float(bar.High)\n        low = float(bar.Low)\n\n        if t.direction == 1:\n            t.best_price = max(t.best_price, high)\n            profit_pts = price - t.entry_price\n        else:\n            t.best_price = min(t.best_price, low) if t.best_price > 0 else low\n            profit_pts = t.entry_price - price\n\n        # 1. STOP LOSS\n        if t.direction == 1 and low <= t.current_stop:\n            self._ClosePosition(\"STOP_LOSS\", bar)\n            return\n        if t.direction == -1 and high >= t.current_stop:\n            self._ClosePosition(\"STOP_LOSS\", bar)\n            return\n\n        # 2. BREAK-EVEN\n        if not t.breakeven_hit and profit_pts >= self.BE_TRIGGER_PTS:\n            if t.direction == 1:\n                t.current_stop = t.entry_price + self.BE_BUFFER_PTS\n            else:\n                t.current_stop = t.entry_price - self.BE_BUFFER_PTS\n            t.breakeven_hit = True\n\n        # 3. TP1: Trim 55%\n        if not t.tp1_hit:\n            tp1_reached = (t.direction == 1 and high >= t.tp1) or (t.direction == -1 and low <= t.tp1)\n            if tp1_reached:\n                trim_qty = max(1, int(t.initial_qty * self.TP1_TRIM_PCT))\n                trim_qty = min(trim_qty, t.remaining_qty - 1)\n                if trim_qty > 0:\n                    self._TrimPosition(trim_qty, \"TP1\", bar)\n                t.tp1_hit = True\n\n        # 4. TP2: Trim 30%\n        if t.tp1_hit and not t.tp2_hit:\n            tp2_reached = (t.direction == 1 and high >= t.tp2) or (t.direction == -1 and low <= t.tp2)\n            if tp2_reached:\n                trim_qty = max(1, int(t.initial_qty * self.TP2_TRIM_PCT))\n                trim_qty = min(trim_qty, t.remaining_qty - 1)\n                if trim_qty > 0:\n                    self._TrimPosition(trim_qty, \"TP2\", bar)\n                t.tp2_hit = True\n                if t.direction == 1:\n                    t.current_stop = max(t.current_stop, t.tp1)\n                else:\n                    t.current_stop = min(t.current_stop, t.tp1)\n\n        # 5. TP3: Close runner\n        if t.tp2_hit and t.remaining_qty > 0:\n            tp3_reached = (t.direction == 1 and high >= t.tp3) or (t.direction == -1 and low <= t.tp3)\n            if tp3_reached:\n                self._ClosePosition(\"TP3_RUNNER\", bar)\n                return\n\n            # Trailing stop: 15 pts from best\n            if t.direction == 1:\n                trail_stop = t.best_price - 15.0\n                t.current_stop = max(t.current_stop, trail_stop)\n            else:\n                trail_stop = t.best_price + 15.0\n                t.current_stop = min(t.current_stop, trail_stop)\n\n    def _TrimPosition(self, qty, reason, bar):\n        if self.nq_contract is None or self.trade is None:\n            return\n        try:\n            trim_direction = -self.trade.direction\n            self.MarketOrder(self.nq_contract, qty * trim_direction)\n            self.trade.remaining_qty -= qty\n            price = float(bar.Close)\n            profit = (price - self.trade.entry_price) * self.trade.direction * qty * self.NQ_POINT_VALUE\n            self.Log(f\"TRIM ({reason}): {qty}x @ {price:.2f} | \"\n                     f\"P&L: ${profit:.0f} | Remaining: {self.trade.remaining_qty}\")\n        except Exception as e:\n            self.Log(f\"Trim failed: {e}\")\n\n    def _ClosePosition(self, reason, bar):\n        if self.nq_contract is None or self.trade is None:\n            return\n        try:\n            remaining = self.trade.remaining_qty\n            if remaining > 0:\n                close_direction = -self.trade.direction\n                self.MarketOrder(self.nq_contract, remaining * close_direction)\n\n            price = float(bar.Close)\n            profit_pts = (price - self.trade.entry_price) * self.trade.direction\n            profit_dollars = profit_pts * self.trade.initial_qty * self.NQ_POINT_VALUE\n\n            is_loss = profit_pts < 0\n            win_str = \"LOSS\" if is_loss else \"WIN\"\n\n            self.Log(f\"EXIT ({reason}): {win_str} {self.trade.initial_qty}x | \"\n                     f\"Entry: {self.trade.entry_price:.2f} Exit: {price:.2f} | \"\n                     f\"P&L: ${profit_dollars:.0f} ({profit_pts:.1f} pts) | \"\n                     f\"{self.trade.entry_reason}\")\n\n            if is_loss:\n                self.daily_losses += 1\n                self.total_losses += 1\n            else:\n                self.daily_losses = 0\n                self.total_wins += 1\n\n            self.trade = None\n            self.in_position = False\n\n        except Exception as e:\n            self.Log(f\"Close failed: {e}\")\n\n    def ForceFlattenEOD(self):\n        if self.in_position and self.nq_contract is not None:\n            self.Liquidate(self.nq_contract)\n            self.Log(f\"EOD FLATTEN: Closed all NQ positions\")\n            self.in_position = False\n            self.trade = None\n\n        wr = (self.total_wins / self.total_trades * 100) if self.total_trades > 0 else 0\n        self.Log(f\"DAILY SUMMARY: Equity ${self.Portfolio.TotalPortfolioValue:,.0f} | \"\n                 f\"Peak ${self.equity_peak:,.0f} | CB: {'ON' if self.circuit_breaker_on else 'OFF'} | \"\n                 f\"Total Trades: {self.total_trades} W: {self.total_wins} L: {self.total_losses} \"\n                 f\"WR: {wr:.0f}%\")\n";
const EXPECTED_HASH = "0ec21a199587b5ca";

function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
    document.getElementById('status').textContent = msg;

async function sha256hex(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function getAuth() {
    const uid = "113205";
    const tok = "d5f5b421b8b826b2c7ff93afa6f0582b78aa61c630704dcf1e18e8ca32a24583";
    const ts = Math.floor(Date.now() / 1000).toString();
    const data = new TextEncoder().encode(tok + ":" + ts);
    const hash = await crypto.subtle.digest('SHA-256', data);
    const hashHex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    const cred = btoa(uid + ":" + hashHex);
    return { "Authorization": "Basic " + cred, "Timestamp": ts, "Content-Type": "application/json" };
}
