<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; color: #e0e0e0; display: flex; justify-content: center; padding: 30px; }
  .container { max-width: 900px; width: 100%; }
  h1 { color: #00d4ff; font-size: 22px; text-align: center; margin-bottom: 5px; }
  h2 { color: #aaa; font-size: 14px; text-align: center; margin-bottom: 30px; font-weight: normal; }
  svg { width: 100%; }
</style>
</head>
<body>
<div class="container">
  <h1>Fib Retracement Depth — What We're Measuring</h1>
  <h2>After an UP impulse leg, once price retraces to 0.786: does it continue deeper BEFORE bouncing back to 1.0?</h2>

  <svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="860" height="620" fill="#1a1a2e"/>

    <!-- Chart area -->
    <g transform="translate(60, 30)">

      <!-- Fib levels - horizontal lines -->
      <!-- 1.000 = leg_high -->
      <line x1="0" y1="20" x2="740" y2="20" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="-10" y="24" fill="#00d4ff" font-size="12" text-anchor="end">1.000</text>
      <text x="745" y="24" fill="#00d4ff" font-size="11">Swing High (leg_high)</text>

      <!-- 0.786 trigger -->
      <line x1="0" y1="100" x2="740" y2="100" stroke="#ffaa00" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="-10" y="104" fill="#ffaa00" font-size="12" text-anchor="end" font-weight="bold">0.786</text>
      <text x="745" y="104" fill="#ffaa00" font-size="11" font-weight="bold">← TRIGGER (price reaches here)</text>

      <!-- 0.618 -->
      <line x1="0" y1="163" x2="740" y2="163" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="-10" y="167" fill="#aaa" font-size="12" text-anchor="end">0.618</text>

      <!-- 0.500 -->
      <line x1="0" y1="207" x2="740" y2="207" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="-10" y="211" fill="#aaa" font-size="12" text-anchor="end">0.500</text>

      <!-- 0.382 -->
      <line x1="0" y1="250" x2="740" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="-10" y="254" fill="#aaa" font-size="12" text-anchor="end">0.382</text>

      <!-- 0.236 -->
      <line x1="0" y1="290" x2="740" y2="290" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="-10" y="294" fill="#aaa" font-size="12" text-anchor="end">0.236</text>

      <!-- 0.000 = leg_low -->
      <line x1="0" y1="390" x2="740" y2="390" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
      <text x="-10" y="394" fill="#ff4444" font-size="12" text-anchor="end">0.000</text>
      <text x="745" y="394" fill="#ff4444" font-size="11">Swing Low (leg_low)</text>

      <!-- IMPULSE LEG (green arrow going up) -->
      <line x1="80" y1="390" x2="80" y2="20" stroke="#00cc66" stroke-width="3" marker-end="url(#arrowGreen)"/>
      <text x="60" y="210" fill="#00cc66" font-size="13" text-anchor="end" transform="rotate(-90, 60, 210)">IMPULSE LEG (UP)</text>

      <!-- Price path after leg — CORRECT scenario -->
      <!-- Path: leg high → retraces to 0.786 → continues to 0.500 → BEFORE going back to 1.0 -->
      <polyline points="120,20 140,30 160,50 180,45 200,70 220,85 240,100"
                fill="none" stroke="#e0e0e0" stroke-width="2"/>
      <!-- From 0.786, price continues down -->
      <polyline points="240,100 260,120 280,140 300,163 320,180 340,207 350,220"
                fill="none" stroke="#ff6600" stroke-width="2.5"/>
      <!-- Eventually bounces -->
      <polyline points="350,220 370,200 390,170 410,140 430,100 450,70 460,50"
                fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

      <!-- Label the CORRECT path -->
      <text x="295" y="85" fill="#ff6600" font-size="12" font-weight="bold">✓ COUNTS: price goes</text>
      <text x="295" y="99" fill="#ff6600" font-size="12" font-weight="bold">from 0.786 → deeper</text>
      <text x="295" y="113" fill="#ff6600" font-size="12" font-weight="bold">BEFORE hitting 1.0</text>

      <!-- Marker: reached 0.618 -->
      <circle cx="300" cy="163" r="5" fill="#ff6600"/>
      <text x="308" y="167" fill="#ff6600" font-size="11">hit 0.618 ✓</text>

      <!-- Marker: reached 0.500 -->
      <circle cx="340" cy="207" r="5" fill="#ff6600"/>
      <text x="348" y="211" fill="#ff6600" font-size="11">hit 0.500 ✓</text>

      <!-- WRONG scenario — price bounces to 1.0 first, then retraces later -->
      <polyline points="500,100 520,80 540,50 555,30 565,20"
                fill="none" stroke="#ff4444" stroke-width="2"/>
      <!-- Back to 1.0 -->
      <circle cx="565" cy="20" r="5" fill="#ff4444"/>
      <!-- Then later comes back down -->
      <polyline points="565,20 580,40 600,80 620,130 640,180 660,207"
                fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="5,3"/>

      <text x="570" y="145" fill="#ff4444" font-size="12" font-weight="bold">✗ DOES NOT COUNT:</text>
      <text x="570" y="159" fill="#ff4444" font-size="12" font-weight="bold">price hit 1.0 first,</text>
      <text x="570" y="173" fill="#ff4444" font-size="12" font-weight="bold">then later retraced.</text>
      <text x="570" y="187" fill="#ff4444" font-size="12" font-weight="bold">That's a NEW move.</text>

      <text x="535" y="15" fill="#ff4444" font-size="11">← bounced to swing high FIRST</text>

      <!-- Trigger zone highlight -->
      <rect x="230" y="96" width="280" height="8" fill="#ffaa00" opacity="0.15" rx="2"/>

      <!-- Question box at bottom -->
      <rect x="100" y="430" width="540" height="120" fill="#16213e" rx="8" stroke="#00d4ff" stroke-width="1"/>
      <text x="120" y="455" fill="#00d4ff" font-size="14" font-weight="bold">The Question (per fib level):</text>
      <text x="120" y="478" fill="#e0e0e0" font-size="13">Starting at 0.786, does price reach [level] BEFORE reaching 1.0?</text>
      <text x="120" y="500" fill="#e0e0e0" font-size="13">• If YES → retracement continued deeper (count as "reached")</text>
      <text x="120" y="522" fill="#e0e0e0" font-size="13">• If 1.0 hit first → bounce won, retracement is over (not counted)</text>
      <text x="120" y="544" fill="#aaa" font-size="12" font-style="italic">Random walk P(→0.500 before →1.0) = 0.214 / 0.500 = 42.8%</text>

    </g>

    <!-- Arrow markers -->
    <defs>
      <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#00cc66"/>
      </marker>
    </defs>
  </svg>
</div>
</body>
</html>
